<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Discount System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <h1>🎓 Student Discount System</h1>
        
        <label for="rollNumber">Enter Roll Number:</label>
        <input type="text" id="rollNumber" placeholder="e.g., 21F-9445">

        <h2>Select a Product:</h2>
        <ul id="productList"></ul>

        <h2>Final Price:</h2>
        <p id="finalPrice">Select a product to see the price</p>

        <button id="toggleTheme">Toggle Theme</button>
    </div>

    <script src="script.js"></script>
</body>
</html>

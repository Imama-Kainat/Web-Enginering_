<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion-Style To-Do List</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Dark Mode Toggle -->
    <div class="mode-toggle" onclick="toggleDarkMode()">
        <span id="toggle-icon">🌙</span>
    </div>

    <!-- To-Do List Container -->
    <div class="todo-container">
        <h1>FocusFlow To-Do List</h1>

        <!-- Task Input -->
        <div class="task-form">
            <input type="text" id="task-name" placeholder="Enter task...">
            <select id="task-priority">
                <option value="high">🔥 High</option>
                <option value="medium">⚡ Medium</option>
                <option value="low">✅ Low</option>
            </select>
            <button id="add-task">Add</button>
        </div>

        <!-- Search & Filter -->
        <div class="filters">
            <input type="text" id="search-task" placeholder="Search tasks...">
            <select id="filter-priority">
                <option value="all">All Priorities</option>
                <option value="high">🔥 High</option>
                <option value="medium">⚡ Medium</option>
                <option value="low">✅ Low</option>
            </select>
        </div>

        <!-- Task List -->
        <h2>📌 Pending Tasks (<span id="task-count">0</span>)</h2>
        <div id="task-list"></div>

        <h2>✅ Completed Tasks</h2>
        <div id="completed-list"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Full Concepts App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1 id="main-heading">JavaScript Concepts Demo 🚀</h1>
        <button id="theme-toggle">Toggle Theme 🌗</button>
    </header>

    <main>
        <section class="container">
            <h2>Local Storage</h2>
            <input type="text" id="user-input" placeholder="Enter some text...">
            <button id="save-btn">Save</button>
            <p id="display-data"></p>
        </section>

        <section class="container">
            <h2>BOM Features</h2>
            <button id="alert-btn">Show Alert</button>
            <button id="confirm-btn">Confirm Action</button>
            <button id="back-btn">Go Back</button>
            <button id="forward-btn">Go Forward</button>
        </section>

        <section class="container">
            <h2>Fetch API Example</h2>
            <button id="fetch-data-btn">Fetch Data</button>
            <div id="api-data"></div>
        </section>

        <section class="container">
            <h2>Dynamic Button Creation</h2>
            <button id="add-btn">Create New Button</button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Result</title>
</head>
<body>
    <h1>Your Answer</h1>
    <p id="answerDisplay"></p>

    <script>
        const answer = sessionStorage.getItem('answer');
        document.getElementById('answerDisplay').textContent = 'You selected: ' + answer;
    </script>
</body>
</html>

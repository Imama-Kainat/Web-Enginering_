<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container my-5">
  <h2 class="mb-4">🛒 Product Management</h2>
  <form id="productForm" class="mb-4">
    <input type="hidden" id="productId">
    <div class="mb-2">
      <input type="text" id="name" class="form-control" placeholder="Product Name" required>
    </div>
    <div class="mb-2">
      <input type="text" id="category" class="form-control" placeholder="Category" required>
    </div>
    <div class="mb-2">
      <input type="number" id="price" class="form-control" placeholder="Price" required>
    </div>
    <div class="mb-2">
      <textarea id="description" class="form-control" placeholder="Description" required></textarea>
    </div>
    <button type="submit" class="btn btn-primary">Save Product</button>
  </form>

  <h4>📋 Product List</h4>
  <table class="table table-bordered">
    <thead class="table-light">
      <tr>
        <th>Name</th>
        <th>Category</th>
        <th>Price ($)</th>
        <th>Description</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="productTable"></tbody>
  </table>

  <script src="script.js"></script>
</body>
</html>

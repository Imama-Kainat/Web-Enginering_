<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mini Blog</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-5">
  <h2 class="mb-4">📝 Add a Blog Post</h2>
  <form id="blogForm">
    <input type="text" id="title" class="form-control mb-2" placeholder="Title" required>
    <input type="text" id="author" class="form-control mb-2" placeholder="Author" required>
    <textarea id="content" class="form-control mb-2" placeholder="Content" rows="4" required></textarea>
    <button class="btn btn-primary">Publish</button>
  </form>

  <hr class="my-5">
  <h3>📚 Blog Posts</h3>
  <div id="blogList" class="row mt-3"></div>

  <script>
    const form = document.getElementById('blogForm');
    const blogList = document.getElementById('blogList');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const blog = {
        title: document.getElementById('title').value,
        author: document.getElementById('author').value,
        content: document.getElementById('content').value
      };
      await fetch('/api/blogs', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(blog)
      });
      form.reset();
      loadBlogs();
    });

    async function loadBlogs() {
      const res = await fetch('/api/blogs');
      const blogs = await res.json();
      blogList.innerHTML = blogs.map(blog => `
        <div class="col-md-4 mb-4">
          <div class="card h-100">
            <div class="card-body">
              <h5>${blog.title}</h5>
              <p><small class="text-muted">By ${blog.author}</small></p>
              <p>${blog.content.substring(0, 100)}...</p>
              <a href="blog.html?id=${blog._id}" class="btn btn-sm btn-outline-primary">Read More</a>
            </div>
          </div>
        </div>
      `).join('');
    }

    loadBlogs();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arithmetic Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calculator">
    <h1>Arithmetic Calculator</h1>
    <input type="number" id="number1" placeholder="Enter first number">
    <input type="number" id="number2" placeholder="Enter second number">
    <div class="buttons">
      <button onclick="performOperations('add')">Add</button>
      <button onclick="performOperations('subtract')">Subtract</button>
      <button onclick="performOperations('multiply')">Multiply</button>
      <button onclick="performOperations('divide')">Divide</button>
    </div>
    <div id="result"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Role Based Auth App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">

  <div class="container mt-5">
    <h2 class="text-center mb-4">Login to Access Protected Routes</h2>

    <form id="loginForm" class="shadow p-4 bg-white rounded">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" id="username" class="form-control" required />
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" required />
      </div>

      <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>

    <div class="mt-4">
      <button class="btn btn-success me-2" onclick="accessRoute('profile')">Profile</button>
      <button class="btn btn-info me-2" onclick="accessRoute('admin')">Admin</button>
      <button class="btn btn-warning me-2" onclick="accessRoute('user')">User</button>
      <button class="btn btn-secondary" onclick="accessRoute('editor')">Editor</button>
    </div>

    <div id="result" class="mt-4"></div>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const resultDiv = document.getElementById('result');
    let token = '';

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('http://localhost:3000/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (res.ok) {
          token = data.token;
          resultDiv.innerHTML = `<div class="alert alert-success">Login successful! Token saved.</div>`;
        } else {
          resultDiv.innerHTML = `<div class="alert alert-danger">${data.message}</div>`;
        }
      } catch (err) {
        resultDiv.innerHTML = `<div class="alert alert-danger">Server Error</div>`;
      }
    });

    async function accessRoute(route) {
      try {
        const res = await fetch(`http://localhost:3000/${route}`, {
          method: 'GET',
          headers: {
            Authorization: `Bearer ${token}`
          }
        });
        const data = await res.json();

        if (res.ok) {
          resultDiv.innerHTML = `<div class="alert alert-info">${data.message}</div>`;
        } else {
          resultDiv.innerHTML = `<div class="alert alert-danger">Access Denied: ${data.message || 'Unauthorized'}</div>`;
        }
      } catch (err) {
        resultDiv.innerHTML = `<div class="alert alert-danger">Error accessing route</div>`;
      }
    }
  </script>
</body>
</html>

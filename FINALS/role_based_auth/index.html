<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login App</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <style>
    body {
      background-color: #f0f2f5;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    .card {
      width: 100%;
      max-width: 400px;
      border: none;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      padding: 30px;
      background-color: #ffffff;
    }

    .form-label {
      font-weight: 500;
    }

    #content-area {
      display: none;
    }

    .btn-primary {
      background-color: #007bff;
      border: none;
    }

    .btn-primary:hover {
      background-color: #0056b3;
    }

    .section-title {
      font-weight: 600;
      font-size: 1.1rem;
      margin-top: 1.2rem;
    }

    .alert {
      padding: 15px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <div class="card">
    <!-- Login Form -->
    <div id="login-form">
      <h3 class="mb-4 text-center">Login</h3>
      <form id="login">
        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <input type="text" class="form-control" id="username" required>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" id="password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Login</button>
      </form>
      <div id="login-error" class="text-danger mt-3 text-center" style="display: none;"></div>
    </div>

    <!-- Protected Content Area -->
    <div id="content-area">
      <h4 class="text-success mb-2">Welcome, <span id="welcome-username"></span>!</h4>
      <p>This is your secure dashboard.</p>

      <div id="profile-info" class="mb-3">
        <!-- Profile data here -->
      </div>

      <div id="admin-content" class="alert alert-info" style="display: none;">
        <div class="section-title">Admin Access</div>
        <p>You have admin privileges.</p>
        <div id="admin-data"></div>
      </div>

      <div id="editor-content" class="alert alert-warning" style="display: none;">
        <div class="section-title">Editor Tools</div>
        <p>You have editor permissions.</p>
        <div id="editor-data"></div>
      </div>

      <button id="logout-button" class="btn btn-outline-secondary w-100 mt-3">Logout</button>
    </div>
  </div>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Your custom JS -->
  <script src="script.js"></script>
</body>
</html>
